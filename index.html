<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Interview App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
        }

        h1 {
            font-size: 28px;
            color: #1a202c;
            margin-bottom: 8px;
        }

        h2 {
            font-size: 22px;
            color: #1a202c;
            margin-bottom: 20px;
        }

        p {
            color: #4a5568;
            margin-bottom: 24px;
        }

        input, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 16px;
            outline: none;
            transition: border 0.2s;
        }

        input:focus, textarea:focus {
            border-color: #667eea;
        }

        textarea {
            height: 150px;
            resize: none;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #5a67d8;
        }

        .counter {
            text-align: center;
            margin-top: 12px;
            color: #a0aec0;
            font-size: 14px;
        }

        .report-item {
            background: #f7fafc;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .report-item span {
            font-weight: bold;
            color: #1a202c;
        }

        .score {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            text-align: center;
            margin: 16px 0;
        }

        .feedback-box {
            background: #ebf8ff;
            border-left: 4px solid #667eea;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: none;
        }

        .feedback-box p {
            margin: 0;
            color: #2d3748;
        }
    </style>
</head>
<body>

    <!-- SCREEN 1: Enter job role -->
    <div id="screen-role" class="card">
        <h1>🎯 AI Interview Prep</h1>
        <p>Enter a job role to generate interview questions</p>
        <input type="text" id="role-input" placeholder="e.g. backend engineer, data scientist" />
        <button onclick="generateQuestions()">Start Interview →</button>
    </div>

    <!-- SCREEN 2: Answer questions -->
    <div id="screen-questions" class="card" style="display:none;">
        <p class="counter" id="question-counter"></p>
        <h2 id="question-text"></h2>
        <div class="feedback-box" id="feedback-box">
            <p id="feedback-text"></p>
        </div>
        <textarea id="answer-input" placeholder="Type your answer here..."></textarea>
        <button id="submit-btn" onclick="submitAnswer()">Submit Answer →</button>
    </div>

    <!-- SCREEN 3: Show report -->
    <div id="screen-report" class="card" style="display:none;">
        <h2>📊 Your Interview Report</h2>
        <div class="score" id="report-score"></div>
        <div class="report-item"><span>Role: </span><span id="report-role"></span></div>
        <div class="report-item"><span>Weaknesses: </span><span id="report-weaknesses"></span></div>
        <div class="report-item"><span>Recommendation: </span><span id="report-recommendation"></span></div>
        <button onclick="location.reload()">Start Again</button>
    </div>

    <script>
        let sessionId = null;
        let questions = [];
        let currentIndex = 0;

        async function generateQuestions() {
            const role = document.getElementById('role-input').value.trim();

            if (!role) {
                alert('Please enter a job role!');
                return;
            }

            const btn = document.getElementById('screen-role').querySelector('button');
            btn.innerText = 'Generating...';
            btn.disabled = true;

            try {
                const response = await fetch('http://127.0.0.1:8000/generate-questions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ role: role })
                });

                const data = await response.json();
                console.log("Full API response:", data);
                console.log("Questions array:", data.questions);
                console.log("Questions length:", data.questions ? data.questions.length : 'undefined');

                sessionId = data.session_id;

                // Handle both array and unexpected formats
                if (!data.questions || data.questions.length === 0) {
                    alert('No questions returned. Check console.');
                    btn.innerText = 'Start Interview →';
                    btn.disabled = false;
                    return;
                }

                questions = data.questions.filter(q => q && q.trim() !== '');
                currentIndex = 0;

                console.log("Filtered questions:", questions);

                document.getElementById('screen-role').style.display = 'none';
                document.getElementById('screen-questions').style.display = 'block';

                showQuestion();

            } catch (err) {
                console.error("Error:", err);
                alert('Something went wrong: ' + err.message);
                btn.innerText = 'Start Interview →';
                btn.disabled = false;
            }
        }

        function showQuestion() {
            console.log("showQuestion called, index:", currentIndex, "question:", questions[currentIndex]);
            document.getElementById('question-text').innerText = questions[currentIndex];
            document.getElementById('answer-input').value = '';
            document.getElementById('question-counter').innerText = `Question ${currentIndex + 1} of ${questions.length}`;
            document.getElementById('feedback-box').style.display = 'none';
            document.getElementById('submit-btn').innerText = 'Submit Answer →';
            document.getElementById('submit-btn').disabled = false;
            document.getElementById('submit-btn').onclick = submitAnswer;
        }

        async function submitAnswer() {
            const answer = document.getElementById('answer-input').value.trim();

            if (!answer) {
                alert('Please type an answer!');
                return;
            }

            const btn = document.getElementById('submit-btn');
            btn.innerText = 'Evaluating...';
            btn.disabled = true;

            try {
                const response = await fetch('http://127.0.0.1:8000/evaluate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: sessionId,
                        question: questions[currentIndex],
                        answer: answer
                    })
                });

                const data = await response.json();
                console.log("Evaluation data:", data);

                document.getElementById('feedback-text').innerText = `Score: ${data.score}/10 — ${data.feedback}`;
                document.getElementById('feedback-box').style.display = 'block';

                currentIndex++;

                if (currentIndex < questions.length) {
                    btn.innerText = 'Next Question →';
                    btn.disabled = false;
                    btn.onclick = showQuestion;
                } else {
                    btn.innerText = 'See Final Report →';
                    btn.disabled = false;
                    btn.onclick = getReport;
                }

            } catch (err) {
                console.error("Error:", err);
                alert('Something went wrong: ' + err.message);
                btn.innerText = 'Submit Answer →';
                btn.disabled = false;
            }
        }

        async function getReport() {
            const btn = document.getElementById('submit-btn');
            btn.innerText = 'Loading Report...';
            btn.disabled = true;

            try {
                const response = await fetch(`http://127.0.0.1:8000/get-report/${sessionId}`);
                const data = await response.json();
                console.log("Report data:", data);

                document.getElementById('screen-questions').style.display = 'none';
                document.getElementById('screen-report').style.display = 'block';

                document.getElementById('report-score').innerText = `${data.average_score} / 10`;
                document.getElementById('report-role').innerText = data.role;
                document.getElementById('report-weaknesses').innerText = data.weakness_summary.join(', ') || 'None';
                document.getElementById('report-recommendation').innerText = data.recommendation;

            } catch (err) {
                console.error("Error:", err);
                alert('Something went wrong loading report: ' + err.message);
            }
        }
    </script>

</body>
</html>
